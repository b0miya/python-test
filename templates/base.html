<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Python 평가 시스템{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { brand: { 50:'#eff6ff', 500:'#3b82f6', 600:'#2563eb', 700:'#1d4ed8' } }
        }
      }
    }
  </script>
  {% block head %}{% endblock %}
</head>
<body class="bg-gray-50 min-h-screen">

{% if user is defined and user %}
<nav class="bg-white border-b border-gray-200 sticky top-0 z-40">
  <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-14">
    <a href="/home" class="flex items-center gap-2 font-bold text-blue-600 text-lg">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/>
      </svg>
      Python 평가
    </a>
    <div class="flex items-center gap-4">
      {% if is_teacher is defined and is_teacher %}
      <a href="/dashboard"
         class="text-sm font-medium text-gray-600 hover:text-blue-600 transition">대시보드</a>
      <a href="/dashboard/submissions"
         class="text-sm font-medium text-gray-600 hover:text-blue-600 transition">제출 현황</a>
      {% endif %}
      <div class="flex items-center gap-2">
        {% if user.picture %}
        <img src="{{ user.picture }}" class="w-8 h-8 rounded-full" alt="">
        {% endif %}
        <span class="text-sm text-gray-700 hidden sm:inline">{{ user.name }}</span>
        <a href="/auth/logout"
           class="text-sm text-gray-400 hover:text-red-500 transition ml-1">로그아웃</a>
      </div>
    </div>
  </div>
</nav>
{% endif %}

<main class="{% block main_class %}{% endblock %}">
  {% block content %}{% endblock %}
</main>

{% block scripts %}{% endblock %}
</body>
</html>
